<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wilds Explorer 3D Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0d1f14 0%, #1a3a25 50%, #0d1f14 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }

        /* Header */
        .game-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            width: 100%;
            background: rgba(10, 25, 16, 0.9);
            border-bottom: 2px solid #DAA520;
        }
        .game-header h1 {
            font-size: 1.1em;
            color: #DAA520;
            font-weight: 700;
        }
        .game-header .controls-hint {
            margin-left: auto;
            font-size: 0.75em;
            color: #8ab89a;
        }

        /* Game Container */
        .game-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* HUD Overlay */
        .hud {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .hud-left, .hud-right {
            background: rgba(10, 25, 16, 0.85);
            border: 1px solid rgba(218, 165, 32, 0.4);
            border-radius: 10px;
            padding: 8px 14px;
        }
        .hud-label {
            font-size: 0.65em;
            color: #8ab89a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hud-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #FFD700;
        }
        .hud-coins {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .coin-icon {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 35% 35%, #ffe066, #DAA520, #b8860b);
            border-radius: 50%;
            border: 1px solid #ffe066;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }

        /* Mission Banner */
        .mission-banner {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(10, 25, 16, 0.95), rgba(26, 58, 37, 0.95));
            border: 1.5px solid #DAA520;
            border-radius: 12px;
            padding: 10px 20px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            animation: missionSlide 0.5s ease-out;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: none;
            min-width: 200px;
        }
        .mission-banner h3 {
            color: #FFD700;
            font-size: 0.8em;
            margin-bottom: 3px;
        }
        .mission-banner p {
            color: #c0d8c8;
            font-size: 0.7em;
        }
        .mission-banner.show { display: block; }

        @keyframes missionSlide {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Touch D-Pad Controls */
        .dpad {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 4px;
        }
        .dpad-btn {
            width: 48px;
            height: 48px;
            background: rgba(218, 165, 32, 0.25);
            border: 1.5px solid rgba(218, 165, 32, 0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            transition: background 0.1s;
            color: #DAA520;
            font-size: 1.2em;
        }
        .dpad-btn:active, .dpad-btn.active {
            background: rgba(218, 165, 32, 0.5);
            border-color: #FFD700;
        }
        .dpad-btn[data-dir="up"] { grid-area: up; }
        .dpad-btn[data-dir="left"] { grid-area: left; }
        .dpad-btn[data-dir="right"] { grid-area: right; }
        .dpad-btn[data-dir="down"] { grid-area: down; }

        /* Action Buttons */
        .action-btns {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 20;
            display: flex;
            gap: 10px;
        }
        .action-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(218, 165, 32, 0.5);
            background: rgba(218, 165, 32, 0.2);
            color: #FFD700;
            font-size: 0.65em;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }
        .action-btn:active { background: rgba(218, 165, 32, 0.5); }

        /* Collect Popup */
        .collect-popup {
            position: absolute;
            pointer-events: none;
            z-index: 15;
            color: #FFD700;
            font-weight: 700;
            font-size: 1.2em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
        }

        /* Start Screen Overlay */
        .start-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 25, 16, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }
        .start-overlay h2 {
            font-size: 1.8em;
            color: #FFD700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(218, 165, 32, 0.3);
        }
        .start-overlay .subtitle {
            color: #8ab89a;
            font-size: 0.95em;
            margin-bottom: 30px;
        }
        .start-overlay .start-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, #DAA520, #b8860b);
            border: none;
            border-radius: 30px;
            color: #0d1f14;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(218, 165, 32, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .start-overlay .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(218, 165, 32, 0.6);
        }
        .start-overlay .features {
            margin-top: 24px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .start-overlay .feature {
            font-size: 0.75em;
            color: #c0d8c8;
        }
        .start-overlay .feature span { font-size: 1.3em; }

        /* Minimap */
        .minimap {
            position: absolute;
            bottom: 100px;
            right: 16px;
            width: 90px;
            height: 90px;
            background: rgba(10, 25, 16, 0.85);
            border: 1.5px solid rgba(218, 165, 32, 0.4);
            border-radius: 50%;
            overflow: hidden;
            z-index: 10;
            pointer-events: none;
        }
        .minimap canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="game-header">
    <span style="font-size:1.3em">🎮</span>
    <h1>Wilds Explorer</h1>
    <span class="controls-hint">WASD / Arrows to move</span>
</div>

<div class="game-wrapper" id="game-wrapper">
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-left">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="score-val">0</div>
        </div>
        <div class="hud-right">
            <div class="hud-coins">
                <div class="coin-icon"></div>
                <div>
                    <div class="hud-label">Coins</div>
                    <div class="hud-value" id="coins-val">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mission Banner -->
    <div class="mission-banner" id="mission-banner">
        <h3>🎯 Mission: Jungle Explorer</h3>
        <p>Collect 5 coins to complete!</p>
    </div>

    <!-- Minimap -->
    <div class="minimap">
        <canvas id="minimap-canvas" width="90" height="90"></canvas>
    </div>

    <!-- Touch D-Pad -->
    <div class="dpad">
        <div class="dpad-btn" data-dir="up">▲</div>
        <div class="dpad-btn" data-dir="left">◀</div>
        <div class="dpad-btn" data-dir="right">▶</div>
        <div class="dpad-btn" data-dir="down">▼</div>
    </div>

    <!-- Action Buttons -->
    <div class="action-btns">
        <div class="action-btn" id="btn-jump">Jump</div>
    </div>

    <!-- Start Screen -->
    <div class="start-overlay" id="start-overlay">
        <h2>🏔️ Wilds Explorer</h2>
        <p class="subtitle">Nepal-Inspired Wildlife Adventure</p>
        <button class="start-btn" id="start-btn">▶ Explore Now</button>
        <div class="features">
            <div class="feature"><span>🌿</span><br>3D Jungle</div>
            <div class="feature"><span>🪙</span><br>Collect Coins</div>
            <div class="feature"><span>🐾</span><br>Wildlife</div>
            <div class="feature"><span>🏛️</span><br>Temple Ruins</div>
        </div>
    </div>
</div>

<script>
// ==============================
// WILDS EXPLORER - 3D GAME DEMO
// ==============================

let scene, camera, renderer, clock;
let player, playerGroup;
let coins = [], enemies = [], trees = [], rocks = [], particles = [];
let score = 0, coinCount = 0;
let gameStarted = false;
let keys = {};
let playerVelocity = new THREE.Vector3();
let playerOnGround = true;
let cameraAngle = 0;
let targetCameraAngle = 0;
const WORLD_SIZE = 80;
const GROUND_Y = 0;

// DOM refs
const scoreEl = document.getElementById('score-val');
const coinsEl = document.getElementById('coins-val');
const missionBanner = document.getElementById('mission-banner');
const startOverlay = document.getElementById('start-overlay');
const startBtn = document.getElementById('start-btn');
const gameWrapper = document.getElementById('game-wrapper');
const minimapCanvas = document.getElementById('minimap-canvas');
const minimapCtx = minimapCanvas.getContext('2d');

// ---- INITIALIZATION ----
function init() {
    clock = new THREE.Clock();

    // Scene
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a3a25);
    scene.fog = new THREE.FogExp2(0x1a3a25, 0.012);

    // Camera - Third person
    const w = gameWrapper.clientWidth;
    const h = gameWrapper.clientHeight;
    camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 500);
    camera.position.set(0, 12, 18);
    camera.lookAt(0, 0, 0);

    // Renderer
    const canvas = document.getElementById('game-canvas');
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // Lighting
    setupLighting();

    // Environment
    createGround();
    createTrees(50);
    createRocks(30);
    createTempleRuins();
    createMountainBackground();

    // Player
    playerGroup = createPlayer();
    scene.add(playerGroup);

    // Coins
    for (let i = 0; i < 10; i++) spawnCoin();

    // Animals/Enemies
    for (let i = 0; i < 5; i++) spawnEnemy();

    // Controls
    setupControls();

    // Resize
    window.addEventListener('resize', onResize);

    // Start animation
    animate();
}

function setupLighting() {
    // Ambient
    const ambient = new THREE.AmbientLight(0x4a7a5a, 0.6);
    scene.add(ambient);

    // Main Sun
    const sun = new THREE.DirectionalLight(0xffeebb, 1.0);
    sun.position.set(30, 50, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 1024;
    sun.shadow.mapSize.height = 1024;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 150;
    sun.shadow.camera.left = -60;
    sun.shadow.camera.right = 60;
    sun.shadow.camera.top = 60;
    sun.shadow.camera.bottom = -60;
    scene.add(sun);

    // Fill light (blue tint for atmosphere)
    const fill = new THREE.DirectionalLight(0x88aaff, 0.3);
    fill.position.set(-20, 30, -30);
    scene.add(fill);

    // Hemisphere light for natural sky-ground blend
    const hemi = new THREE.HemisphereLight(0x87ceeb, 0x2d5a3d, 0.4);
    scene.add(hemi);
}

// ---- GROUND / TERRAIN ----
function createGround() {
    // Main ground
    const groundGeo = new THREE.PlaneGeometry(WORLD_SIZE * 2, WORLD_SIZE * 2, 40, 40);
    // Add slight terrain undulation
    const verts = groundGeo.attributes.position;
    for (let i = 0; i < verts.count; i++) {
        const x = verts.getX(i);
        const y = verts.getY(i);
        const noise = Math.sin(x * 0.1) * Math.cos(y * 0.1) * 0.8 +
                      Math.sin(x * 0.05 + 1) * Math.cos(y * 0.07) * 1.2;
        verts.setZ(i, noise);
    }
    groundGeo.computeVertexNormals();

    const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d6a4f });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grass patches (flat circles on ground)
    for (let i = 0; i < 80; i++) {
        const size = 1 + Math.random() * 3;
        const gGeo = new THREE.CircleGeometry(size, 6);
        const shade = 0x1a + Math.floor(Math.random() * 30);
        const gMat = new THREE.MeshLambertMaterial({
            color: new THREE.Color(`rgb(${30 + Math.floor(Math.random()*20)}, ${80 + Math.floor(Math.random()*40)}, ${50 + Math.floor(Math.random()*20)})`)
        });
        const patch = new THREE.Mesh(gGeo, gMat);
        patch.rotation.x = -Math.PI / 2;
        patch.position.set(
            (Math.random() - 0.5) * WORLD_SIZE * 1.5,
            0.02,
            (Math.random() - 0.5) * WORLD_SIZE * 1.5
        );
        scene.add(patch);
    }

    // Path/trail
    createPath();
}

function createPath() {
    const pathGeo = new THREE.PlaneGeometry(3, WORLD_SIZE * 1.5, 1, 20);
    const pathVerts = pathGeo.attributes.position;
    for (let i = 0; i < pathVerts.count; i++) {
        const y = pathVerts.getY(i);
        pathVerts.setX(i, pathVerts.getX(i) + Math.sin(y * 0.1) * 5);
    }
    const pathMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
    const path = new THREE.Mesh(pathGeo, pathMat);
    path.rotation.x = -Math.PI / 2;
    path.position.y = 0.03;
    scene.add(path);
}

// ---- TREES ----
function createTrees(count) {
    for (let i = 0; i < count; i++) {
        const tree = createTree();
        let x, z;
        do {
            x = (Math.random() - 0.5) * WORLD_SIZE * 1.6;
            z = (Math.random() - 0.5) * WORLD_SIZE * 1.6;
        } while (Math.abs(x) < 4 && Math.abs(z) < 4); // Keep center clear
        tree.position.set(x, 0, z);
        tree.rotation.y = Math.random() * Math.PI * 2;
        const s = 0.7 + Math.random() * 0.8;
        tree.scale.set(s, s, s);
        scene.add(tree);
        trees.push(tree);
    }
}

function createTree() {
    const group = new THREE.Group();

    // Trunk
    const trunkH = 3 + Math.random() * 3;
    const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, trunkH, 6);
    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5D4037 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = trunkH / 2;
    trunk.castShadow = true;
    group.add(trunk);

    // Foliage layers (low-poly cone style)
    const layers = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < layers; i++) {
        const r = 2.5 - i * 0.5;
        const h = 2.5 - i * 0.3;
        const leafGeo = new THREE.ConeGeometry(r, h, 6 + Math.floor(Math.random() * 3));
        const green = new THREE.Color().setHSL(0.33 + Math.random() * 0.05, 0.6 + Math.random() * 0.2, 0.25 + Math.random() * 0.15);
        const leafMat = new THREE.MeshLambertMaterial({ color: green });
        const leaf = new THREE.Mesh(leafGeo, leafMat);
        leaf.position.y = trunkH + i * 1.5;
        leaf.castShadow = true;
        group.add(leaf);
    }

    return group;
}

// ---- ROCKS ----
function createRocks(count) {
    for (let i = 0; i < count; i++) {
        const rock = createRock();
        rock.position.set(
            (Math.random() - 0.5) * WORLD_SIZE * 1.4,
            0,
            (Math.random() - 0.5) * WORLD_SIZE * 1.4
        );
        rock.rotation.y = Math.random() * Math.PI * 2;
        scene.add(rock);
        rocks.push(rock);
    }
}

function createRock() {
    const size = 0.5 + Math.random() * 1.5;
    const geo = new THREE.DodecahedronGeometry(size, 0);
    const shade = 0.3 + Math.random() * 0.15;
    const mat = new THREE.MeshLambertMaterial({
        color: new THREE.Color(shade, shade - 0.05, shade - 0.1)
    });
    const rock = new THREE.Mesh(geo, mat);
    rock.position.y = size * 0.4;
    rock.scale.y = 0.5 + Math.random() * 0.3;
    rock.castShadow = true;
    rock.receiveShadow = true;
    return rock;
}

// ---- TEMPLE RUINS ----
function createTempleRuins() {
    const ruinsGroup = new THREE.Group();

    // Base platform
    const baseGeo = new THREE.BoxGeometry(10, 1, 10);
    const stoneMat = new THREE.MeshLambertMaterial({ color: 0x8B7D6B });
    const base = new THREE.Mesh(baseGeo, stoneMat);
    base.position.y = 0.5;
    base.castShadow = true;
    base.receiveShadow = true;
    ruinsGroup.add(base);

    // Second tier
    const tier2Geo = new THREE.BoxGeometry(7, 0.8, 7);
    const tier2 = new THREE.Mesh(tier2Geo, stoneMat);
    tier2.position.y = 1.4;
    ruinsGroup.add(tier2);

    // Pillars
    const pillarGeo = new THREE.CylinderGeometry(0.4, 0.5, 4, 8);
    const pillarMat = new THREE.MeshLambertMaterial({ color: 0x9B8B7B });
    const pillarPositions = [
        [-3, 3, -3], [3, 3, -3], [-3, 3, 3], [3, 3, 3],
        [-1.5, 3, -3], [1.5, 3, -3]
    ];
    pillarPositions.forEach(([x, y, z]) => {
        const pillar = new THREE.Mesh(pillarGeo, pillarMat);
        pillar.position.set(x, y, z);
        pillar.castShadow = true;
        ruinsGroup.add(pillar);
    });

    // Broken pillars
    const brokenGeo = new THREE.CylinderGeometry(0.4, 0.5, 2, 8);
    const broken1 = new THREE.Mesh(brokenGeo, pillarMat);
    broken1.position.set(-1.5, 2, 3);
    broken1.rotation.z = 0.3;
    ruinsGroup.add(broken1);

    // Roof slab (partially broken)
    const roofGeo = new THREE.BoxGeometry(8, 0.4, 4);
    const roof = new THREE.Mesh(roofGeo, stoneMat);
    roof.position.set(0, 5.2, -3);
    roof.rotation.z = -0.05;
    ruinsGroup.add(roof);

    // Golden artifact on top
    const artifactGeo = new THREE.OctahedronGeometry(0.6, 0);
    const artifactMat = new THREE.MeshStandardMaterial({
        color: 0xFFD700,
        metalness: 0.9,
        roughness: 0.1,
        emissive: 0xFFAA00,
        emissiveIntensity: 0.3
    });
    const artifact = new THREE.Mesh(artifactGeo, artifactMat);
    artifact.position.set(0, 6, -3);
    artifact.userData.isArtifact = true;
    ruinsGroup.add(artifact);

    // Position temple at a notable spot
    ruinsGroup.position.set(25, 0, -20);
    scene.add(ruinsGroup);

    // Point light for temple glow
    const templeLight = new THREE.PointLight(0xFFAA00, 0.8, 15);
    templeLight.position.set(25, 4, -20);
    scene.add(templeLight);
}

// ---- MOUNTAIN BACKGROUND ----
function createMountainBackground() {
    // Large mountain shapes in background
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const dist = WORLD_SIZE * 1.2 + Math.random() * 20;
        const height = 20 + Math.random() * 30;
        const width = 15 + Math.random() * 20;

        const mtnGeo = new THREE.ConeGeometry(width, height, 5 + Math.floor(Math.random() * 3));
        const shade = 0.15 + Math.random() * 0.1;
        const mtnMat = new THREE.MeshLambertMaterial({
            color: new THREE.Color(shade * 0.5, shade, shade * 0.7)
        });
        const mtn = new THREE.Mesh(mtnGeo, mtnMat);
        mtn.position.set(
            Math.cos(angle) * dist,
            height / 2 - 3,
            Math.sin(angle) * dist
        );
        scene.add(mtn);

        // Snow caps
        if (height > 30) {
            const snowGeo = new THREE.ConeGeometry(width * 0.4, height * 0.25, 5);
            const snowMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee });
            const snow = new THREE.Mesh(snowGeo, snowMat);
            snow.position.set(
                Math.cos(angle) * dist,
                height - 5,
                Math.sin(angle) * dist
            );
            scene.add(snow);
        }
    }
}

// ---- PLAYER CHARACTER ----
function createPlayer() {
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(1.2, 1.8, 0.9);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a7c59, metalness: 0.1, roughness: 0.8 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.8;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xD2A679 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 3.1;
    head.castShadow = true;
    group.add(head);

    // Explorer hat
    const brimGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.1, 8);
    const hatMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
    const brim = new THREE.Mesh(brimGeo, hatMat);
    brim.position.y = 3.6;
    group.add(brim);

    const topGeo = new THREE.CylinderGeometry(0.4, 0.55, 0.5, 8);
    const top = new THREE.Mesh(topGeo, hatMat);
    top.position.y = 3.85;
    group.add(top);

    // Eyes
    const eyeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.05);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.2, 3.2, 0.48);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.2, 3.2, 0.48);
    group.add(rightEye);

    // Camera equipment (backpack)
    const packGeo = new THREE.BoxGeometry(0.8, 1.0, 0.5);
    const packMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.5, roughness: 0.3 });
    const pack = new THREE.Mesh(packGeo, packMat);
    pack.position.set(0, 2.0, -0.6);
    group.add(pack);

    // Camera lens on side
    const lensGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.4, 8);
    const lensMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.9, roughness: 0.1 });
    const lens = new THREE.Mesh(lensGeo, lensMat);
    lens.rotation.z = Math.PI / 2;
    lens.position.set(0.7, 2.3, 0);
    group.add(lens);

    // Legs
    const legGeo = new THREE.BoxGeometry(0.4, 1.0, 0.4);
    const legMat = new THREE.MeshLambertMaterial({ color: 0x5D4037 });
    const leftLeg = new THREE.Mesh(legGeo, legMat);
    leftLeg.position.set(-0.3, 0.5, 0);
    leftLeg.castShadow = true;
    group.add(leftLeg);
    const rightLeg = new THREE.Mesh(legGeo, legMat);
    rightLeg.position.set(0.3, 0.5, 0);
    rightLeg.castShadow = true;
    group.add(rightLeg);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.3, 1.2, 0.3);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x4a7c59 });
    const leftArm = new THREE.Mesh(armGeo, armMat);
    leftArm.position.set(-0.8, 1.6, 0);
    group.add(leftArm);
    const rightArm = new THREE.Mesh(armGeo, armMat);
    rightArm.position.set(0.8, 1.6, 0);
    group.add(rightArm);

    group.position.set(0, 0, 0);
    group.userData = { speed: 0.25, bobPhase: 0 };
    return group;
}

// ---- COINS ----
function spawnCoin() {
    const group = new THREE.Group();

    const coinGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.12, 16);
    const coinMat = new THREE.MeshStandardMaterial({
        color: 0xFFD700,
        metalness: 0.95,
        roughness: 0.1,
        emissive: 0xFFAA00,
        emissiveIntensity: 0.4
    });
    const coin = new THREE.Mesh(coinGeo, coinMat);
    coin.castShadow = true;
    group.add(coin);

    // Glow ring
    const ringGeo = new THREE.RingGeometry(0.55, 0.7, 16);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0xFFD700,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    group.add(ring);

    // Sparkle light
    const sparkle = new THREE.PointLight(0xFFD700, 0.4, 5);
    sparkle.position.y = 0.5;
    group.add(sparkle);

    let x, z;
    do {
        x = (Math.random() - 0.5) * WORLD_SIZE;
        z = (Math.random() - 0.5) * WORLD_SIZE;
    } while (Math.abs(x) < 3 && Math.abs(z) < 3);

    group.position.set(x, 1.5, z);
    group.userData = {
        floatSpeed: 1.5 + Math.random() * 1.5,
        floatOffset: Math.random() * Math.PI * 2,
        baseY: 1.5
    };

    scene.add(group);
    coins.push(group);
}

// ---- ENEMIES (ANIMALS) ----
function spawnEnemy() {
    const type = Math.random() > 0.5 ? 'deer' : 'boar';
    const group = createAnimal(type);

    group.position.set(
        (Math.random() - 0.5) * WORLD_SIZE * 0.8,
        0,
        (Math.random() - 0.5) * WORLD_SIZE * 0.8
    );

    group.userData = {
        type: type,
        velocity: new THREE.Vector3(
            (Math.random() - 0.5) * 0.15,
            0,
            (Math.random() - 0.5) * 0.15
        ),
        changeTimer: 0,
        changeInterval: 100 + Math.random() * 200
    };

    scene.add(group);
    enemies.push(group);
}

function createAnimal(type) {
    const group = new THREE.Group();

    if (type === 'deer') {
        // Deer body
        const bodyGeo = new THREE.BoxGeometry(0.8, 1.0, 2.0);
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0xB87333 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 1.2;
        body.castShadow = true;
        group.add(body);

        // Deer head
        const headGeo = new THREE.BoxGeometry(0.5, 0.6, 0.7);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.set(0, 1.8, 1.2);
        group.add(head);

        // Antlers
        const antlerMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
        const antlerGeo = new THREE.CylinderGeometry(0.04, 0.06, 0.8, 4);
        const la = new THREE.Mesh(antlerGeo, antlerMat);
        la.position.set(-0.2, 2.3, 1.2);
        la.rotation.z = -0.4;
        group.add(la);
        const ra = new THREE.Mesh(antlerGeo, antlerMat);
        ra.position.set(0.2, 2.3, 1.2);
        ra.rotation.z = 0.4;
        group.add(ra);

        // Legs
        const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 4);
        const legMat = new THREE.MeshLambertMaterial({ color: 0x8B5E3C });
        [[-0.3, 0.4, 0.7], [0.3, 0.4, 0.7], [-0.3, 0.4, -0.7], [0.3, 0.4, -0.7]].forEach(([x, y, z]) => {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(x, y, z);
            group.add(leg);
        });

        // White spot on tail
        const spotGeo = new THREE.SphereGeometry(0.2, 6, 6);
        const spotMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const spot = new THREE.Mesh(spotGeo, spotMat);
        spot.position.set(0, 1.3, -1.1);
        group.add(spot);
    } else {
        // Boar body
        const bodyGeo = new THREE.BoxGeometry(1.0, 0.8, 1.5);
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0x5C4033 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.8;
        body.castShadow = true;
        group.add(body);

        // Boar head
        const headGeo = new THREE.BoxGeometry(0.6, 0.6, 0.5);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.set(0, 0.9, 0.9);
        group.add(head);

        // Snout
        const snoutGeo = new THREE.BoxGeometry(0.3, 0.2, 0.3);
        const snoutMat = new THREE.MeshLambertMaterial({ color: 0xD2A679 });
        const snout = new THREE.Mesh(snoutGeo, snoutMat);
        snout.position.set(0, 0.8, 1.15);
        group.add(snout);

        // Tusks
        const tuskGeo = new THREE.ConeGeometry(0.04, 0.25, 4);
        const tuskMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee });
        const lt = new THREE.Mesh(tuskGeo, tuskMat);
        lt.position.set(-0.15, 0.65, 1.1);
        lt.rotation.z = -0.3;
        group.add(lt);
        const rt = new THREE.Mesh(tuskGeo, tuskMat);
        rt.position.set(0.15, 0.65, 1.1);
        rt.rotation.z = 0.3;
        group.add(rt);

        // Legs
        const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.5, 4);
        const legMat = new THREE.MeshLambertMaterial({ color: 0x3a2a1a });
        [[-0.35, 0.25, 0.5], [0.35, 0.25, 0.5], [-0.35, 0.25, -0.5], [0.35, 0.25, -0.5]].forEach(([x, y, z]) => {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(x, y, z);
            group.add(leg);
        });
    }

    return group;
}

// ---- PARTICLES ----
function spawnParticles(x, y, z, color, count) {
    for (let i = 0; i < count; i++) {
        const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
        const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);

        const angle = Math.random() * Math.PI * 2;
        const speed = 0.1 + Math.random() * 0.2;
        particles.push({
            mesh,
            vx: Math.cos(angle) * speed,
            vy: 0.1 + Math.random() * 0.2,
            vz: Math.sin(angle) * speed,
            life: 40 + Math.random() * 20
        });
        scene.add(mesh);
    }
}

// ---- CONTROLS ----
function setupControls() {
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    // Touch D-Pad
    const dpadBtns = document.querySelectorAll('.dpad-btn');
    dpadBtns.forEach(btn => {
        const dir = btn.dataset.dir;
        const keyMap = { up: 'w', down: 's', left: 'a', right: 'd' };

        const activate = (e) => { e.preventDefault(); keys[keyMap[dir]] = true; btn.classList.add('active'); };
        const deactivate = (e) => { e.preventDefault(); keys[keyMap[dir]] = false; btn.classList.remove('active'); };

        btn.addEventListener('touchstart', activate, { passive: false });
        btn.addEventListener('touchend', deactivate, { passive: false });
        btn.addEventListener('mousedown', activate);
        btn.addEventListener('mouseup', deactivate);
        btn.addEventListener('mouseleave', deactivate);
    });

    // Jump button
    const jumpBtn = document.getElementById('btn-jump');
    const doJump = () => {
        if (playerOnGround) {
            playerVelocity.y = 0.3;
            playerOnGround = false;
        }
    };
    jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); }, { passive: false });
    jumpBtn.addEventListener('mousedown', doJump);

    window.addEventListener('keydown', e => {
        if (e.key === ' ') doJump();
    });
}

// ---- UPDATE FUNCTIONS ----
function updatePlayer(dt) {
    const speed = playerGroup.userData.speed;
    let moved = false;

    // Compute forward direction from camera angle
    const moveDir = new THREE.Vector3();

    if (keys['w'] || keys['arrowup']) { moveDir.z -= 1; moved = true; }
    if (keys['s'] || keys['arrowdown']) { moveDir.z += 1; moved = true; }
    if (keys['a'] || keys['arrowleft']) { moveDir.x -= 1; moved = true; }
    if (keys['d'] || keys['arrowright']) { moveDir.x += 1; moved = true; }

    if (moved) {
        moveDir.normalize().multiplyScalar(speed);
        playerGroup.position.x += moveDir.x;
        playerGroup.position.z += moveDir.z;

        // Face movement direction
        const angle = Math.atan2(moveDir.x, moveDir.z);
        playerGroup.rotation.y = angle;

        // Bob animation
        playerGroup.userData.bobPhase += 0.15;
        playerGroup.position.y = GROUND_Y + Math.sin(playerGroup.userData.bobPhase) * 0.1;
    } else {
        playerGroup.position.y = GROUND_Y;
    }

    // Jump / gravity
    playerGroup.position.y += playerVelocity.y;
    if (playerGroup.position.y > GROUND_Y) {
        playerVelocity.y -= 0.015;
    } else {
        playerGroup.position.y = GROUND_Y;
        playerVelocity.y = 0;
        playerOnGround = true;
    }

    // World boundaries
    const bound = WORLD_SIZE * 0.7;
    playerGroup.position.x = Math.max(-bound, Math.min(bound, playerGroup.position.x));
    playerGroup.position.z = Math.max(-bound, Math.min(bound, playerGroup.position.z));

    // Coin collection
    for (let i = coins.length - 1; i >= 0; i--) {
        const c = coins[i];
        const dx = playerGroup.position.x - c.position.x;
        const dz = playerGroup.position.z - c.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 2) {
            score += 10;
            coinCount++;
            scoreEl.textContent = score;
            coinsEl.textContent = coinCount;

            spawnParticles(c.position.x, c.position.y, c.position.z, 0xFFD700, 15);
            showCollectPopup('+10', c.position);

            scene.remove(c);
            coins.splice(i, 1);
            spawnCoin();

            // Mission check
            if (coinCount === 5) showMission('🎯 Mission Complete!', 'Collect 5 more coins!');
            if (coinCount === 10) showMission('⭐ Great Explorer!', 'Find the temple ruins!');
            if (coinCount === 15) showMission('🏆 Jungle Master!', 'You are unstoppable!');
        }
    }

    // Enemy interaction
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const dx = playerGroup.position.x - e.position.x;
        const dz = playerGroup.position.z - e.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 2.5) {
            score += 5;
            scoreEl.textContent = score;
            const color = e.userData.type === 'deer' ? 0xB87333 : 0x5C4033;
            spawnParticles(e.position.x, 1, e.position.z, color, 10);
            showCollectPopup('+5 📸', e.position);

            scene.remove(e);
            enemies.splice(i, 1);
            spawnEnemy();
        }
    }
}

function updateCamera() {
    const followDist = 14;
    const followHeight = 10;
    const lookAhead = 3;

    const px = playerGroup.position.x;
    const pz = playerGroup.position.z;

    // Smooth camera follow from behind player
    const targetX = px - Math.sin(playerGroup.rotation.y) * followDist;
    const targetZ = pz - Math.cos(playerGroup.rotation.y) * followDist;

    camera.position.x += (targetX - camera.position.x) * 0.05;
    camera.position.z += (targetZ - camera.position.z) * 0.05;
    camera.position.y += (followHeight - camera.position.y) * 0.05;

    const lookTarget = new THREE.Vector3(
        px + Math.sin(playerGroup.rotation.y) * lookAhead,
        2,
        pz + Math.cos(playerGroup.rotation.y) * lookAhead
    );
    camera.lookAt(lookTarget);
}

function updateCoins(time) {
    coins.forEach(c => {
        const ud = c.userData;
        c.position.y = ud.baseY + Math.sin(time * ud.floatSpeed + ud.floatOffset) * 0.3;
        c.rotation.y += 0.03;
    });
}

function updateEnemies() {
    enemies.forEach(e => {
        const ud = e.userData;
        ud.changeTimer++;

        if (ud.changeTimer > ud.changeInterval) {
            ud.changeTimer = 0;
            ud.velocity.set(
                (Math.random() - 0.5) * 0.15,
                0,
                (Math.random() - 0.5) * 0.15
            );
        }

        e.position.add(ud.velocity);

        // Face movement direction
        if (ud.velocity.length() > 0.01) {
            const angle = Math.atan2(ud.velocity.x, ud.velocity.z);
            e.rotation.y = angle;
        }

        // Boundaries
        const bound = WORLD_SIZE * 0.6;
        if (e.position.x < -bound || e.position.x > bound) ud.velocity.x *= -1;
        if (e.position.z < -bound || e.position.z > bound) ud.velocity.z *= -1;
    });
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.mesh.position.x += p.vx;
        p.mesh.position.y += p.vy;
        p.mesh.position.z += p.vz;
        p.vy -= 0.008;
        p.life--;
        p.mesh.material.opacity = p.life / 60;

        if (p.life <= 0) {
            scene.remove(p.mesh);
            particles.splice(i, 1);
        }
    }
}

function updateMinimap() {
    const ctx = minimapCtx;
    ctx.clearRect(0, 0, 90, 90);

    // Background
    ctx.fillStyle = 'rgba(10, 25, 16, 0.9)';
    ctx.beginPath();
    ctx.arc(45, 45, 44, 0, Math.PI * 2);
    ctx.fill();

    const scale = 0.45;
    const cx = 45, cy = 45;

    // Trees as green dots
    ctx.fillStyle = '#2d6a4f';
    trees.forEach(t => {
        const x = cx + (t.position.x - playerGroup.position.x) * scale;
        const y = cy + (t.position.z - playerGroup.position.z) * scale;
        if (x > 2 && x < 88 && y > 2 && y < 88) {
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Coins as gold dots
    ctx.fillStyle = '#FFD700';
    coins.forEach(c => {
        const x = cx + (c.position.x - playerGroup.position.x) * scale;
        const y = cy + (c.position.z - playerGroup.position.z) * scale;
        if (x > 2 && x < 88 && y > 2 && y < 88) {
            ctx.beginPath();
            ctx.arc(x, y, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Animals as red dots
    ctx.fillStyle = '#e67e22';
    enemies.forEach(e => {
        const x = cx + (e.position.x - playerGroup.position.x) * scale;
        const y = cy + (e.position.z - playerGroup.position.z) * scale;
        if (x > 2 && x < 88 && y > 2 && y < 88) {
            ctx.beginPath();
            ctx.arc(x, y, 2, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Player as center arrow
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.fill();

    // Direction indicator
    ctx.strokeStyle = '#DAA520';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    const dirX = cx + Math.sin(playerGroup.rotation.y) * 8;
    const dirY = cy + Math.cos(playerGroup.rotation.y) * 8;
    ctx.lineTo(dirX, dirY);
    ctx.stroke();
}

// ---- UI HELPERS ----
function showMission(title, desc) {
    missionBanner.querySelector('h3').textContent = title;
    missionBanner.querySelector('p').textContent = desc;
    missionBanner.classList.add('show');
    missionBanner.style.animation = 'none';
    missionBanner.offsetHeight; // reflow
    missionBanner.style.animation = 'missionSlide 0.5s ease-out';

    setTimeout(() => missionBanner.classList.remove('show'), 3000);
}

function showCollectPopup(text, pos) {
    const div = document.createElement('div');
    div.className = 'collect-popup';
    div.textContent = text;

    // Project 3D pos to screen
    const v = pos.clone();
    v.project(camera);
    const x = (v.x * 0.5 + 0.5) * gameWrapper.clientWidth;
    const y = (-v.y * 0.5 + 0.5) * gameWrapper.clientHeight;
    div.style.left = x + 'px';
    div.style.top = y + 'px';

    gameWrapper.appendChild(div);
    setTimeout(() => div.remove(), 1000);
}

// ---- GAME LOOP ----
function animate() {
    requestAnimationFrame(animate);

    if (!gameStarted) {
        // Slow rotate camera around origin for start screen
        const time = Date.now() * 0.0003;
        camera.position.set(Math.cos(time) * 25, 15, Math.sin(time) * 25);
        camera.lookAt(0, 2, 0);
        renderer.render(scene, camera);
        return;
    }

    const time = Date.now() * 0.001;

    updatePlayer();
    updateCamera();
    updateCoins(time);
    updateEnemies();
    updateParticles();
    updateMinimap();

    renderer.render(scene, camera);
}

function onResize() {
    const w = gameWrapper.clientWidth;
    const h = gameWrapper.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}

// ---- START GAME ----
startBtn.addEventListener('click', () => {
    gameStarted = true;
    startOverlay.style.display = 'none';
    showMission('🎯 Mission: Jungle Explorer', 'Collect 5 coins to complete!');
});

// Initialize
init();
</script>
